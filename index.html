<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bianca World Cup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        
        <div id="loading-screen" class="screen active" style="justify-content: center; height: 80vh;">
            <h3 style="color: var(--brand-green);">LOADING BIANCA...</h3>
        </div>

        <div id="auth-screen" class="screen">
            <h1>JOIN THE GAME</h1>
            <p>Enter your phone number to start predicting and winning.</p>
            <input type="tel" id="phone-input" class="mono" inputmode="numeric" pattern="[0-9]*" placeholder="08X-XXX-XXXX">
            <button onclick="verifyPhone()">START PLAYING</button>
        </div>

        <div id="dashboard-screen" class="screen">
            
            <div class="status-badge">
                <div class="shield"><span id="user-rank">...</span></div>
                <div class="points-display"><span id="user-footballs" class="mono">0</span> <span style="font-size: 1rem;">PTS</span></div>
                <div class="streak-display">🔥 <span id="user-streak" class="mono">0</span> WIN STREAK</div>
            </div>

            <div class="dashboard-module">
                <div class="match-header">
                    <span>UPCOMING MATCH</span>
                    <span id="next-match-time" style="color: var(--brand-gold);">Loading...</span>
                </div>
                
                <p class="muted" style="margin-bottom: 18px; font-weight: 600;">Who will win? Tap a flag to vote (Cost: 100 PTS)</p>

                <div class="match-teams">
                    <div class="team-btn" onclick="castVote('teamA')">
                        <div class="team-flag" id="flag-a">🏳️</div>
                        <span class="team-name" id="name-a">Team A</span>
                    </div>
                    <div class="vs-badge">VS</div>
                    <div class="team-btn" onclick="castVote('teamB')">
                        <div class="team-flag" id="flag-b">🏳️</div>
                        <span class="team-name" id="name-b">Team B</span>
                    </div>
                </div>
                <p class="mono" id="countdown-timer" style="font-size: 1.1rem; color: var(--brand-green); margin-top: 20px; margin-bottom: 0;">--:--:--:--</p>
            </div>

            <div class="dashboard-module">
                <h3>🏆 GLOBAL TOP 5</h3>
                <div id="leaderboard-list" style="text-align: left; width: 100%; margin-top: 15px;">
                    <p class="muted">Loading scores...</p>
                </div>
            </div>

            <div class="claim-toggle" onclick="toggleClaimForm()">
                <span>+ ADD POINTS FROM RECEIPT</span>
            </div>
            
            <div id="claim-form" style="display: none; width: 100%; margin-bottom: 30px;">
                <input type="number" id="spend-amount" class="mono" inputmode="numeric" pattern="[0-9]*" placeholder="Receipt Amount (THB)">
                <input type="number" id="bill-number" class="mono" inputmode="numeric" pattern="[0-9]*" placeholder="Bill / Receipt Number">
                <input type="password" id="staff-passcode" class="mono" inputmode="numeric" pattern="[0-9]*" placeholder="Staff Passcode (Required)">
                <button onclick="submitClaim()" id="claim-btn">AUTHORIZE POINTS</button>
                <p id="claim-message" class="muted" style="margin-top: 10px; display: none;"></p>
            </div>

        </div>
    </div>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="app.js"></script>
</body>
</html>
